        body {

            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            -webkit-tap-highlight-color: transparent;
            color: #334155;
        }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .fade-out { animation: fadeOut 0.3s ease-in forwards; }
        .slide-up { animation: slideUp 0.5s ease-out forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-10px); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Loader Animation */
        .loader { border-top-color: #1d4ed8; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Floating Bubbles for Welcome Screen */
        .bubble { position: absolute; border-radius: 50%; background: rgba(37, 99, 235, 0.1); animation: float 6s infinite ease-in-out; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-20px); } 100% { transform: translateY(0px); } }

        .option-btn.selected { background-color: #eff6ff; border-color: #3b82f6; color: #1d4ed8; }

        ::-webkit-scrollbar { display: none; }
        
        /* Dimension Bar Animation */
        .dim-bar { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Hidden Glow Effect */
        @keyframes glow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .hidden-glow { background: linear-gradient(-45deg, #fbbf24, #f59e0b, #d97706, #fbbf24); background-size: 400% 400%; animation: glow 3s ease infinite; padding: 4px; border-radius: 1.75rem; box-shadow: 0 0 30px rgba(245, 158, 11, 0.4); }
        
        /* Shimmer overlay for hidden personality */
        .shimmer {
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            animation: shine 4s infinite;
            z-index: 20;
            pointer-events: none;
        }
        @keyframes shine { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }

            startTest() {
                // Randomly extract 20 distinct questions, KEEPING chronological order
                let indices = [];
                while(indices.length < 20) {
                    let r = Math.floor(Math.random() * questionsRaw.length);
                    if(indices.indexOf(r) === -1) indices.push(r);
                }
                indices.sort((a, b) => a - b);
                
                this.state.currentQuestions = indices.map(i => questionsRaw[i]);

                this.elements.welcome.classList.add('fade-out');
                setTimeout(() => {
                    this.elements.welcome.classList.add('hidden');
                    this.elements.welcome.classList.remove('fade-out');
                    this.elements.quiz.classList.remove('hidden');
                    this.elements.quiz.classList.add('fade-in');
                    this.resetState();
                    this.renderQuestion();
                }, 300);
            },

            resetState() {
                this.state.currentQIndex = 0;
                this.state.history = [];
                this.state.scores = {};
                this.state.cheatSequence = '';
                Object.keys(personalities).forEach(key => this.state.scores[key] = 0);
            },

            renderQuestion() {
                const totalQs = this.state.currentQuestions.length;
                const q = this.state.currentQuestions[this.state.currentQIndex];
                
                const progressPercent = ((this.state.currentQIndex) / totalQs) * 100;
                this.elements.progBar.style.width = `${Math.max(5, progressPercent)}%`;
                this.elements.progText.textContent = `${this.state.currentQIndex + 1} / ${totalQs}`;

                if (this.state.currentQIndex > 0) {
                    this.elements.btnPrev.classList.remove('opacity-0', 'pointer-events-none');
                } else {
                    this.elements.btnPrev.classList.add('opacity-0', 'pointer-events-none');
                }

                this.elements.qText.classList.remove('fade-in');
                this.elements.optContainer.classList.remove('fade-in');
                void this.elements.qText.offsetWidth; 

                this.elements.qText.innerHTML = `<span class="text-blue-600 mr-2">${this.state.currentQIndex + 1}.</span>${q.q.replace(/\n/g, '<br>')}`;
                this.elements.optContainer.innerHTML = '';

                const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
                q.opts.forEach((opt, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn w-full text-left p-4 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 flex items-start gap-4 text-slate-700 transition-colors shadow-sm';
                    btn.onclick = () => this.handleOptionClick(opt[1], btn, index);
                    btn.innerHTML = `
                        <span class="flex-shrink-0 w-6 h-6 rounded bg-slate-100 text-slate-500 flex items-center justify-center text-sm font-bold mt-0.5 border border-slate-200">${letters[index]}</span>
                        <span class="font-medium leading-relaxed">${opt[0]}</span>
                    `;
                    this.elements.optContainer.appendChild(btn);
                });

                this.elements.qText.classList.add('fade-in');
                this.elements.optContainer.classList.add('fade-in');
                this.state.isAnimating = false;
            },

            prevQuestion() {
                if (this.state.isAnimating || this.state.currentQIndex === 0) return;
                
                const lastSelectedType = this.state.history.pop();
                if (lastSelectedType && this.state.scores[lastSelectedType] > 0) {
                    this.state.scores[lastSelectedType]--;
                }
                
                // 撤销作弊码记录
                this.state.cheatSequence = this.state.cheatSequence.slice(0, -1);
                
                this.state.currentQIndex--;
                this.renderQuestion();
            },

            handleOptionClick(type, btnElement, optIndex) {
                if (this.state.isAnimating) return;
                this.state.isAnimating = true;

                btnElement.classList.add('selected', 'ring-2', 'ring-blue-500', 'ring-offset-1');
                this.state.scores[type] = (this.state.scores[type] || 0) + 1;
                this.state.history.push(type);

                // 记录选项字母，用于匹配测试通关码
                const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
                this.state.cheatSequence += letters[optIndex];

                setTimeout(() => {
                    if (this.state.currentQIndex < this.state.currentQuestions.length - 1) {
                        this.state.currentQIndex++;
                        this.renderQuestion();
                    } else {
                        this.processResult();
                    }
                }, 300);
            },

            processResult() {
                this.elements.progBar.style.width = '100%';
                this.elements.quiz.classList.add('hidden');
                this.elements.loader.classList.remove('hidden');
                this.elements.loader.classList.add('flex');

                setTimeout(() => {
                    this.elements.loader.classList.remove('flex');
                    this.elements.loader.classList.add('hidden');
                    const code = this.calculateResultCode();
                    this.showResult(code);
                }, 2000);
            },

            countSupportCodes(scores, codesArray) {
                return codesArray.filter(code => (scores[code] || 0) >= 1).length;
            },

            calculateResultCode() {
                // 0. 优先判断是否有预埋测试作弊码输入
                const cheatMap = {
                    "AFCBDEAFBCDEAFBCDAFE": "DATE",
                    "BDAFCEBDACEFBDACFEBA": "PLAN",
                    "CFABDECFBDAECFABDEAC": "BIRD",
                    "DACFBEADFCBEADCFBEAF": "MECH",
                    "EABDCFCEABDFCEABDCFA": "EXCL",
                    "FCEBADFCEABDCFEBADAC": "SAFE",
                    "ABDFECABCFDEABDFCEBA": "SPIN",
                    "BCFEADBCDAFEBCFEADCA": "CASH",
                    "CDEAFBCDEFABCADEFBAC": "SETT",
                    "DEFACBDEBCAFDEFACBDA": "TALK",
                    "EFCBADFEACBDEFCBADAE": "TOWR",
                    "FADECBFABCDEFADECBFA": "GOLD",
                    "ACFDBEACDBFEACFDBECA": "TECH",
                    "BFEACDBFCADEBFEACDAB": "MEME",
                    "CAEBFDCAFDBECAEBFDAC": "BOXX",
                    "DBCAEFDBFEACDBCAEFBF": "PUMP",
                    "FEDCBAAFEEDDCCBBAAFF": "BRK",
                    "ABCDEFABCFEDABCDEFBA": "PEAK",
                    "FADFCEBCAFEDBCAFEADF": "FIRE",
                    "CEADFBCEBFADCEADFBCD": "PATH",
                    "EBFADCEBADCFEBFADCAE": "OPEN",
                    "FFEEDDCCBBAAFFEEDDCC": "BALL"
                };
                
                if (cheatMap[this.state.cheatSequence]) {
                    return cheatMap[this.state.cheatSequence];
                }

                const s = this.state.scores;
                const getS = (code) => s[code] || 0;
                
                // Normal priorities
                const normalPriority = ['DATE', 'PLAN', 'SAFE', 'CASH', 'BOXX', 'EXCL', 'BIRD', 'TOWR', 'TALK', 'MEME', 'GOLD', 'MECH', 'TECH', 'PUMP', 'SETT', 'SPIN'];
                
                let uniqueScores = [...new Set(normalPriority.map(getS))].sort((a,b) => b-a);
                const topNormalScore = uniqueScores[0] || 0;
                const secondNormalScore = uniqueScores[1] || 0;

                let topCodes = normalPriority.filter(k => getS(k) === topNormalScore);
                topCodes.sort((a, b) => normalPriority.indexOf(a) - normalPriority.indexOf(b));
                const topNormalCode = topCodes[0];

                // 强单一锁定
                if (topNormalScore >= 7 && secondNormalScore <= 3) {
                    return topNormalCode;
                }

                // 隐藏人格计算
                const hiddens = [];

                // BRK
                const brkScore = getS('PLAN')*3 + getS('DATE')*3 + getS('MECH')*2 + getS('SAFE')*2 + getS('CASH')*1 + getS('BOXX')*1 + getS('TECH')*1;
                if (getS('PLAN')>=3 && getS('DATE')>=3 && (getS('MECH')+getS('SAFE'))>=4 && (getS('CASH')+getS('BOXX')+getS('TECH'))>=2 && brkScore>=28) {
                    if (this.countSupportCodes(s, ['PLAN','DATE','MECH','SAFE','CASH','BOXX','TECH']) >= 5) {
                        hiddens.push({ code: 'BRK', score: brkScore });
                    }
                }

                // PEAK
                const peakScore = getS('GOLD')*4 + getS('TECH')*3 + getS('MEME')*2 + getS('PLAN')*1 + getS('DATE')*1 + getS('SAFE')*1;
                if (getS('GOLD')>=4 && getS('TECH')>=2 && (getS('MEME')+getS('PLAN')+getS('DATE')+getS('SAFE'))>=4 && peakScore>=26) {
                    if (this.countSupportCodes(s, ['GOLD','TECH','MEME','PLAN','DATE','SAFE']) >= 4) {
                        hiddens.push({ code: 'PEAK', score: peakScore });
                    }
                }

                // FIRE
                const fireScore = getS('PUMP')*4 + getS('MEME')*3 + getS('TALK')*2 + getS('TOWR')*2 + getS('GOLD')*1;
                if (getS('PUMP')>=4 && getS('MEME')>=3 && (getS('TALK')+getS('TOWR')+getS('GOLD'))>=3 && fireScore>=29) {
                    if (this.countSupportCodes(s, ['PUMP','MEME','TALK','TOWR','GOLD']) >= 4) {
                        hiddens.push({ code: 'FIRE', score: fireScore });
                    }
                }

                // PATH
                const pathScore = getS('BIRD')*4 + getS('PLAN')*3 + getS('TECH')*2 + getS('SAFE')*1 + getS('EXCL')*1;
                if (getS('BIRD')>=4 && getS('PLAN')>=3 && (getS('TECH')+getS('SAFE')+getS('EXCL'))>=3 && pathScore>=28) {
                    if (this.countSupportCodes(s, ['BIRD','PLAN','TECH','SAFE','EXCL']) >= 4) {
                        hiddens.push({ code: 'PATH', score: pathScore });
                    }
                }

                // OPEN
                const openScore = getS('TALK')*4 + getS('TOWR')*3 + getS('BIRD')*3 + getS('CASH')*2 + getS('MEME')*1 + getS('PLAN')*1;
                if ((getS('TALK')+getS('TOWR'))>=6 && getS('BIRD')>=3 && (getS('CASH')+getS('MEME')+getS('PLAN'))>=3 && openScore>=31) {
                    if (this.countSupportCodes(s, ['TALK','TOWR','BIRD','CASH','MEME','PLAN']) >= 5) {
                        hiddens.push({ code: 'OPEN', score: openScore });
                    }
                }

                // BALL
                const ballScore = getS('SAFE')*4 + getS('BOXX')*3 + getS('EXCL')*3 + getS('PLAN')*1 + getS('DATE')*1 + getS('CASH')*1 + getS('PUMP')*1;
                if (getS('SAFE')>=5 && getS('BOXX')>=4 && getS('EXCL')>=2 && (getS('PLAN')+getS('DATE')+getS('CASH')+getS('PUMP'))>=4 && ballScore>=34) {
                    if (this.countSupportCodes(s, ['SAFE','BOXX','EXCL','PLAN','DATE','CASH','PUMP']) >= 5) {
                        hiddens.push({ code: 'BALL', score: ballScore });
                    }
                }

                if (hiddens.length === 0) {
                    return topNormalCode;
                }

                if (hiddens.length === 1) {
                    return hiddens[0].code;
                }

                hiddens.sort((a, b) => b.score - a.score);
                
                if (hiddens[0].score - hiddens[1].score >= 6) {
                    return hiddens[0].code;
                } else {
                    return topNormalCode;
                }
            },

                        } catch (e) {
                            // 核心修复：本地双击打开被浏览器拦截时的无感降级方案
                            // 既然不让转图片，就把画好的 Canvas 直接贴出来看，提示截屏
                            posterImage.classList.add('hidden');
                            canvasContainer.innerHTML = '';
                            canvas.style.width = '100%';
                            canvas.style.height = 'auto';
                            canvasContainer.appendChild(canvas);
                            canvasContainer.classList.remove('hidden');
                            tip.innerHTML = '✨ <span class="text-amber-300">请使用手机【截屏】保存海报</span>';
                        }
                        
                        modal.classList.remove('hidden');
                        modal.classList.add('flex');
                    }).catch(err => {
                        console.error('Error generating poster:', err);
                        actionBar.style.display = 'flex';
                        dimSection.style.display = 'block';
                        alert("海报生成异常，请重试。");
                    });
                }, 300);
            },

            showToast() {
                this.elements.toast.style.opacity = '1';
                setTimeout(() => {
                    this.elements.toast.style.opacity = '0';
                }, 2000);
            }
        };
    </script>
</body>
</html>
