            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            -webkit-tap-highlight-color: transparent;
            color: #334155;

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .fade-out { animation: fadeOut 0.3s ease-in forwards; }
        .slide-up { animation: slideUp 0.5s ease-out forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-10px); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .option-btn { transition: all 0.2s ease; }
        .option-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); border-color: #3b82f6; }
        .option-btn:active { transform: translateY(0); }
        .option-btn.selected { background-color: #eff6ff; border-color: #3b82f6; color: #1d4ed8; }

        ::-webkit-scrollbar { display: none; }
        
        /* Generated Card styling */
        .result-card-container {
            background-color: #f8fafc;

        /* Dimension Bar Animation */
        .dim-bar { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }

    <script>
        // 1. Data Definitions
        
        // Original descriptions for the "Simple Interpretation" block
        const simpleDescriptions = {
            'DATE': '你的世界里没有“差不多”，只有“节点到底能不能拿下”。别人看到的是日期，你看到的是关键线路、资源缺口和最后一公里。你有点像进度表的天敌，哪里变红就盯哪里。你的价值在于关键时刻稳住节奏，把目标从纸面推进到现场。',
            'PLAN': '你的人生文件夹里，永远有“终版”“真终版”“再修终版”。你擅长把混乱的问题重新排布，把一句“想办法”变成一套能执行的路径。你偶尔被方案追着跑，但你也让团队在复杂局面里看见办法。',
            'BIRD': '早起的鸟儿有虫吃，先飞的八局人有线索。你对政策、市场、客户动态和新赛道格外敏感。别人还在问“这事靠谱吗”，你已经开始收藏、转发、判断机会。你的价值在于提前看见变化，提醒团队别错过下一阵风。',
            'MECH': '只要现场还在转，你就像没有拔电源。塔吊、机械、作业面、交叉施工，你都想亲眼看看。你可能嘴上说“我就去一趟”，结果一趟接一趟。你的价值在于把问题带回现场，把答案落到现场。',
            'EXCL': '再野的数据，到你手里也得排队站好。你擅长把混乱信息驯成一张表，把模糊任务变成清单、台账、进度条。你有时像被 Excel 选中的人，但正是你的秩序感，让团队看得清进展、找得到责任、追得上闭环。',
            'SAFE': '你常说“我先看下制度”，其实是在给大家开护盾。合同、用印、授权、招采、接待、保密、流程、台账，别人看到“差不多可以”，你看到“这里还差一个依据”。你的价值在于多问一句、多留一道痕，让团队走得更稳。',
            'SPIN': '你的一天经常在几个点位之间高速旋转。办公室找你，现场找你，群里也找你。你看似被任务推着转，实际是在用脚步把问题摸实。你的价值在于让情况不悬空，让判断有现场依据。',
            'CASH': '你表面沉稳，心里常驻到账提醒。你关心合同额，也关心现金流；关心项目热闹，也关心经营质量。你像一条务实的锦鲤，游过的地方都要问一句“钱什么时候回来”。你的价值在于让成果变成真正的经营贡献。',
            'SETT': '你平时低调，关键时候能从资料深处找出决定性证据。签证、变更、确权、结算，每一页材料在你眼里都有重量。你像资料山里的扫地僧，出手不多，一出手就直击要害。你的价值在于把项目成果守住、算清、落袋。',
            'TALK': '你天生适合在人群里打开局面。政府、平台、客户、合作方，你总能找到话题，把陌生关系聊成熟人关系。你的自嘲是“又去拜访了”，你的本事是把一次次见面变成长久信任。你的价值在于让企业真正扎进区域。',
            'TOWR': '你像一座长期在线的信号塔，客户那边一有变化，你就能收到波动。你未必总是站在最热闹的场合，但你一直保持连接、回应需求、传递信息。你的价值在于把客户需求和企业资源稳定接通，让合作关系不断线。',
            'GOLD': '项目刚开始，你已经在想“能不能冲个奖”。你不是只爱奖杯，而是相信好工程值得被看见、被认可、被沉淀。你擅长发现项目亮点，把平凡动作打磨成精品路径。你的价值在于把履约成果推向更高标准。',
            'TECH': '别人看到施工难题，你看到课题、工法、专利和产品。你习惯把问题放进“炼丹炉”，加入技术、数据、场景和验证，最后炼出一点新东西。你的价值在于让项目经验不止停留在项目，把工程能力转化为企业能力。',
            'MEME': '你总能从普通现场里找到发光的瞬间。一个节点、一张照片、一句口号、一次开放，你都能想办法讲出情绪和记忆点。你的价值在于让工程被看见，让团队被记住，让企业自信有画面、有声音、有传播力。',

            'PUMP': '你也会累，但你很少让队伍泄气。压力大的时候，你负责把话说亮一点，把气氛托起来一点，把大家重新拉回同一个方向。你的价值在于让目标有温度，让团队有劲头，让“我们一起上”变成真的行动。'
        };

        // Raw dimensions data parsing
        const rawDimsData = `
1. 节点屠夫｜DATE
B1 战略雷达｜3分｜大方向你看得懂，但更关心今天能不能往前拱一步。
B2 节点压迫感｜5分｜节点一红，你的精神闹钟就自动响了。
B3 方案修复力｜4分｜方案可以不完美，但必须能把节点救回来。
B4 现场续航值｜4分｜现场有问题，你基本能自动刷新定位。
B5 表格驯化力｜3分｜表格能用就行，重点是它能不能推动进度。
B6 合规护盾｜3分｜你会守规矩，但不会让流程把节点拖住。

B8 结算潜行力｜2分｜资料你会看，但通常先让节点过关。
B9 客户连接度｜2分｜客户重要，但你更擅长用履约说话。
B10 创优执念｜3分｜如果节点顺利，奖杯可以顺手想一想。
B11 科技炼化值｜2分｜技术很好，但先问它能不能帮现场提速。
B12 故事捕光力｜2分｜你不是不会讲故事，只是常常没空讲。
B13 保障兜底力｜3分｜需要补位时，你会先顶上再说。
B14 团队充气值｜3分｜你鼓舞人的方式通常是：别慌，今天必须推进。
B15 抗压续航值｜5分｜压力越大，你越像被关键线路点亮了。
2. 方案修理师｜PLAN
B1 战略雷达｜4分｜你能把大方向翻译成可执行的小动作。
B2 节点压迫感｜4分｜节点会催你，但你会先把路径修顺。
B3 方案修复力｜5分｜别人说“想办法”，你已经打开第八版方案。
B4 现场续航值｜3分｜你会去现场，但更想带着方案去。
B5 表格驯化力｜4分｜你相信好方案旁边一定要配好表格。
B6 合规护盾｜4分｜方案可以灵活，但边界必须清楚。
B7 经营算盘｜3分｜你会考虑成本，只是不会让成本把脑洞锁死。
B8 结算潜行力｜3分｜资料链条你会顾及，不能让方案后期说不清。
B9 客户连接度｜3分｜客户需求你会听，但会先转成工作语言。
B10 创优执念｜3分｜方案修得好，创优就有底子。
B11 科技炼化值｜3分｜新技术可以上，但得先嵌进方案里。
B12 故事捕光力｜3分｜你能讲故事，前提是逻辑已经修顺。
B13 保障兜底力｜3分｜你不一定最爱兜底，但会把兜底动作写进方案。
B14 团队充气值｜3分｜你安慰人的方式是：我再排一版。
B15 抗压续航值｜4分｜你不是不累，只是方案还没定不能倒。
3. 风向先飞鸟｜BIRD
B1 战略雷达｜5分｜风刚动，你的羽毛已经开始震动。
B2 节点压迫感｜2分｜节点你知道重要，但你更爱看远处的云。
B3 方案修复力｜3分｜你能提出方向，细化方案还需要搭档。
B4 现场续航值｜2分｜你不一定天天在现场，但常常第一个发现新方向。
B5 表格驯化力｜2分｜表格可以有，但别影响你看风口。
B6 合规护盾｜2分｜你会看边界，但更关心机会窗口。

B8 结算潜行力｜1分｜资料深潜不是你的主场，你更适合高空侦察。
B9 客户连接度｜4分｜客户一有新动向，你大概率能先收到信号。
B10 创优执念｜3分｜新方向如果够亮，你也会想到荣誉。
B11 科技炼化值｜4分｜你对新技术、新产品、新赛道天然兴奋。
B12 故事捕光力｜4分｜风向本身就是故事，你很会抓第一阵风。
B13 保障兜底力｜2分｜你更适合探路，兜底需要百宝箱队友。
B14 团队充气值｜3分｜你会用“有新机会”给大家续一口气。
B15 抗压续航值｜3分｜你能抗压，但最好让你抗在机会前线。

B1 战略雷达｜2分｜战略你听得懂，但你更关心现场机器转没转。

                avatarImg.style.left = result.leftPos;
                avatarImg.style.top = result.topPos;

                // Render 15 Dimensions
                this.elements.dimsContainer.innerHTML = '';
                result.dims.forEach((dim, idx) => {
                    const el = document.createElement('div');
                    el.className = 'bg-white rounded-xl border border-slate-100 p-4 hover:shadow-md transition-shadow relative overflow-hidden';
                    
                    // Simple logic to convert score to a letter scale for aesthetic (L/M/H equivalent)
                    const letter = dim.score >= 4 ? 'H' : (dim.score === 3 ? 'M' : 'L');
                    const colorClass = dim.score >= 4 ? 'text-blue-700' : (dim.score === 3 ? 'text-emerald-600' : 'text-amber-500');

                    el.innerHTML = `
                        <div class="flex justify-between items-center mb-2 relative z-10">
                            <div class="font-bold text-slate-800 text-sm tracking-wide">${dim.id} ${dim.name}</div>
                            <div class="font-black text-lg ${colorClass} tracking-widest bg-slate-50 px-3 py-1 rounded-lg border border-slate-100">
                                ${letter} <span class="text-sm font-medium text-slate-400">/ ${dim.score}分</span>
                            </div>
                        </div>
                        <p class="text-xs text-slate-500 relative z-10">${dim.text}</p>
                        <!-- decorative progress bar -->
                        <div class="absolute bottom-0 left-0 h-1 bg-gradient-to-r from-blue-500/20 to-transparent dim-bar" style="width: 0%"></div>
                    `;
                    this.elements.dimsContainer.appendChild(el);
                    
                    // Trigger animation
                    setTimeout(() => {
                        el.querySelector('.dim-bar').style.width = `${(dim.score / 5) * 100}%`;
                    }, 500 + (idx * 50));
                });
                
                this.elements.progBar.style.width = '100%';
                
                setTimeout(() => {
                    this.elements.quiz.classList.add('hidden');
                    this.elements.result.classList.remove('hidden');
                    this.elements.result.classList.add('fade-in');
                    window.scrollTo(0,0);
                }, 300);
            },

            resetTest() {
                this.elements.result.classList.add('hidden');
                this.elements.welcome.classList.remove('hidden');
                this.elements.welcome.classList.add('slide-up');
            },

            generatePoster() {
                this.showToast();
                
                // Temporarily adjust UI for better capture
                const actionBar = document.getElementById('action-bar');
                const dimSection = document.getElementById('dimension-section'); // 隐藏15维评分
                
                actionBar.style.display = 'none';
                dimSection.style.display = 'none';

                // Allow DOM to settle before rendering
                setTimeout(() => {
                    const captureArea = document.getElementById('capture-area');
                    html2canvas(captureArea, {
                        scale: 2, // High resolution
                        useCORS: true,
                        backgroundColor: '#f1f5f9'
                    }).then(canvas => {
                        actionBar.style.display = 'flex'; // Restore UI
                        dimSection.style.display = 'block';
                        
                        const imgData = canvas.toDataURL('image/png');
                        const posterImage = document.getElementById('poster-image');
                        const modal = document.getElementById('poster-modal');
                        
                        posterImage.src = imgData;
                        modal.classList.remove('hidden');
                        modal.classList.add('flex');
                    }).catch(err => {
                        console.error('Error generating poster:', err);
                        actionBar.style.display = 'flex';
                        dimSection.style.display = 'block';
                        alert("生成图片失败，请稍后再试。");
                    });
                }, 200);
            },

            showToast() {
                this.elements.toast.style.opacity = '1';
                setTimeout(() => {
                    this.elements.toast.style.opacity = '0';
                }, 2000);
            }
        };

    </script>
</body>
</html>
